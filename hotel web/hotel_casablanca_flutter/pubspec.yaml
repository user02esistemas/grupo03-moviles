name: hotel_casablanca_flutter
description: Flutter Web para Hotel Casa Blanca conectado al backend Express actual.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.7
  http: ^1.2.2
  http_parser: ^4.0.2
  google_sign_in: ^6.2.2
  google_sign_in_web: ^0.12.4+4
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/qr_alex_yape.JPG
