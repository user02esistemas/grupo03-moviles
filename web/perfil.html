<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil · Casa Blanca</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="main">
    <div class="topbar"><h1>Mi perfil</h1></div>

    <div class="content" style="max-width:640px">
      <!-- Datos -->
      <div class="card">
        <h2 class="card__title">Datos personales</h2>
        <form id="formPerfil" novalidate>
          <div class="form-grid">
            <div class="form-row">
              <label class="lbl" for="pNombre">Nombre *</label>
              <input class="inp" id="pNombre" maxlength="60" />
              <div class="campo-error"></div>
            </div>
            <div class="form-row">
              <label class="lbl" for="pApellido">Apellido *</label>
              <input class="inp" id="pApellido" maxlength="60" />
              <div class="campo-error"></div>
            </div>
            <div class="form-row">
              <label class="lbl" for="pCorreo">Correo</label>
              <input class="inp" id="pCorreo" disabled />
              <p class="form-hint">El correo no se puede modificar.</p>
            </div>
            <div class="form-row">
              <label class="lbl" for="pTelefono">Teléfono</label>
              <input class="inp" id="pTelefono" maxlength="20" />
              <div class="campo-error"></div>
            </div>
          </div>
          <div class="text-right">
            <button type="submit" class="btn btn--primario" id="btnGuardarPerfil">Guardar cambios</button>
          </div>
        </form>
      </div>

      <!-- Contraseña -->
      <div class="card">
        <h2 class="card__title">Cambiar contraseña</h2>
        <form id="formPassword" novalidate>
          <div class="form-row">
            <label class="lbl" for="passActual">Contraseña actual *</label>
            <input class="inp" type="password" id="passActual" autocomplete="current-password" />
            <div class="campo-error"></div>
          </div>
          <div class="form-row">
            <label class="lbl" for="passNueva">Contraseña nueva *</label>
            <input class="inp" type="password" id="passNueva" autocomplete="new-password" />
            <div class="campo-error"></div>
          </div>
          <div class="form-row">
            <label class="lbl" for="passRepite">Repetir nueva *</label>
            <input class="inp" type="password" id="passRepite" autocomplete="new-password" />
            <div class="campo-error"></div>
          </div>
          <div class="text-right">
            <button type="submit" class="btn btn--primario" id="btnGuardarPassword">Cambiar contraseña</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/endpoints.js"></script>
  <script src="js/catalogos.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
